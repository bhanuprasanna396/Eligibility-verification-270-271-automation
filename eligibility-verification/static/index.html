<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eligibility Dashboard</title>
  <style>
    :root {
      --blue:   #2563eb;
      --green:  #16a34a;
      --amber:  #d97706;
      --red:    #dc2626;
      --bg:     #f1f5f9;
      --card:   #ffffff;
      --text:   #1e293b;
      --muted:  #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    /* ---- Header ---- */
    header {
      background: var(--blue);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1   { font-size: 18px; font-weight: 600; }
    .subtitle   { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .refresh-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.28); }

    /* ---- Layout ---- */
    .main    { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
    .meta    { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 10px; }

    /* ---- Stat cards ---- */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-icon {
      width: 42px; height: 42px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .icon-blue   { background: #dbeafe; }
    .icon-amber  { background: #fef3c7; }
    .icon-red    { background: #fee2e2; }
    .icon-gray   { background: #f3f4f6; }
    .stat-label  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value  { font-size: 26px; font-weight: 700; line-height: 1.15; }

    /* ---- Two-column grid ---- */
    .grid { display: grid; grid-template-columns: 1fr 380px; gap: 16px; align-items: start; }

    /* ---- Card ---- */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .card-header {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h2   { font-size: 14px; font-weight: 600; }
    .card-count {
      font-size: 11px; color: var(--muted);
      background: var(--bg); padding: 2px 10px; border-radius: 12px;
    }

    /* ---- Table ---- */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 9px 16px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td      { background: #f8fafc; }
    .patient-name    { font-weight: 600; }
    .provider-name   { color: var(--muted); }

    /* ---- Badges ---- */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .b-verified    { background: #dcfce7; color: #166534; }
    .b-pending     { background: #fef9c3; color: #854d0e; }
    .b-gap_found   { background: #fee2e2; color: #991b1b; }
    .b-error       { background: #f3f4f6; color: #374151; }
    .b-not_required{ background: #e0f2fe; color: #075985; }
    .b-critical    { background: #fee2e2; color: #991b1b; }
    .b-high        { background: #ffedd5; color: #9a3412; }
    .b-warning     { background: #fef9c3; color: #854d0e; }
    .b-info        { background: #e0f2fe; color: #075985; }

    /* ---- Buttons ---- */
    .btn {
      padding: 5px 12px; border-radius: 5px;
      border: none; cursor: pointer;
      font-size: 12px; font-weight: 500;
      transition: background 0.15s;
    }
    .btn-sm        { padding: 4px 10px; font-size: 11px; }
    .btn-primary   { background: var(--blue); color: white; }
    .btn-primary:hover     { background: #1d4ed8; }
    .btn-primary:disabled  { background: #93c5fd; cursor: default; }
    .btn-resolve   { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .btn-resolve:hover { background: #dbeafe; }
    .btn-success   { background: var(--green); color: white; }
    .btn-success:hover { background: #15803d; }
    .btn-cancel    { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-cancel:hover { background: var(--border); }

    /* ---- Gap list ---- */
    .gap-item {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
    }
    .gap-item:last-child { border-bottom: none; }
    .gap-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
    }
    .gap-type    { font-weight: 600; font-size: 12px; }
    .gap-patient { font-size: 11px; color: var(--blue); font-weight: 600; margin-bottom: 3px; }
    .gap-desc    { font-size: 12px; color: var(--muted); line-height: 1.45; margin-top: 4px; }
    .gap-actions { margin-top: 8px; }

    /* ---- Empty & error states ---- */
    .empty       { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }
    .state-error { color: #dc2626; }

    /* ---- Spinner ---- */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.5);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }

    /* ---- Modal ---- */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 10px;
      padding: 24px; width: 440px; max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h3      { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .modal-sub     { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
    .form-group    { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .form-group input,
    .form-group textarea {
      width: 100%; padding: 8px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus { outline: none; border-color: var(--blue); }
    .form-group textarea   { height: 72px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ---- Toast ---- */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e293b; color: white;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ---- Responsive ---- */
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Eligibility Dashboard</h1>
    <div class="subtitle">Automated 270/271 insurance verification</div>
  </div>
  <button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button>
</header>

<div class="main">
  <div class="meta" id="lastUpdated"></div>

  <!-- Stat cards -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon icon-blue">&#128197;</div>
      <div>
        <div class="stat-label">Appointments Today</div>
        <div class="stat-value" id="stat-today">&#8212;</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon icon-amber">&#8987;</div>
      <div>
        <div class="stat-label">Checks Pending</div>
        <div class="stat-value" id="stat-pending">&#8212;</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon icon-red">&#9888;</div>
      <div>
        <div class="stat-label">Unresolved Gaps</div>
        <div class="stat-value" id="stat-gaps">&#8212;</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon icon-gray">&#10007;</div>
      <div>
        <div class="stat-label">Failed Checks</div>
        <div class="stat-value" id="stat-failed">&#8212;</div>
      </div>
    </div>
  </div>

  <!-- Main grid -->
  <div class="grid">

    <!-- Appointments -->
    <div class="card">
      <div class="card-header">
        <h2>Upcoming Appointments <span style="font-weight:400;color:var(--muted)">(next 7 days)</span></h2>
        <span class="card-count" id="appt-count">loading…</span>
      </div>
      <div id="appt-body"><div class="empty">Loading&#8230;</div></div>
    </div>

    <!-- Gaps -->
    <div class="card">
      <div class="card-header">
        <h2>Unresolved Gaps</h2>
        <span class="card-count" id="gaps-count">loading…</span>
      </div>
      <div id="gaps-body"><div class="empty">Loading&#8230;</div></div>
    </div>

  </div><!-- /grid -->
</div><!-- /main -->

<!-- Resolve modal -->
<div class="modal-overlay" id="resolveModal" onclick="maybeCloseModal(event)">
  <div class="modal">
    <h3>Resolve Coverage Gap</h3>
    <div class="modal-sub" id="modal-desc"></div>
    <div class="form-group">
      <label>Your name *</label>
      <input id="resolvedBy" type="text" placeholder="e.g. Jane (front desk)">
    </div>
    <div class="form-group">
      <label>Resolution note <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
      <textarea id="resolutionNote" placeholder="What action was taken? e.g. Called insurance, confirmed active"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="submitResolve()">Mark Resolved</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let _resolveGapId = null;
const _polls = {};
const _pollingAppts = new Set();  // appointment IDs whose checks are in-flight

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function badge(cls, label) {
  return `<span class="badge b-${cls}">${label}</span>`;
}

const STATUS_LABELS = {
  verified: 'Verified', pending: 'Pending', gap_found: 'Gap Found',
  error: 'Error', not_required: 'Not Required'
};

function statusBadge(s) { return badge(s, STATUS_LABELS[s] || s); }
function severityBadge(s) { return badge(s, s.charAt(0).toUpperCase() + s.slice(1)); }

function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
       + ' '
       + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function plural(n, word) { return `${n} ${word}${n !== 1 ? 's' : ''}`; }

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ---------------------------------------------------------------------------
// Fetch helpers
// ---------------------------------------------------------------------------

async function get(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

async function post(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r;
}

async function patch(path, body) {
  const r = await fetch(path, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r;
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------

function renderAppointments(appts) {
  document.getElementById('appt-count').textContent = plural(appts.length, 'appointment');
  const el = document.getElementById('appt-body');

  if (!appts.length) {
    el.innerHTML = '<div class="empty">No upcoming appointments in the next 7 days</div>';
    return;
  }

  const rows = appts.map(a => {
    const ptId     = 'PT-' + a.patient.patient_id.replace(/-/g,'').slice(0,6).toUpperCase();
    const patient  = `${a.patient.first_name} ${a.patient.last_name}`;
    const provName = a.provider.organization_name
                  || `Dr. ${a.provider.last_name || a.provider.first_name}`;
    const specialty = a.provider.taxonomy_code || '';
    const apptType  = a.appointment_type || '—';
    const isPolling = _pollingAppts.has(a.appointment_id);
    const canCheck  = !isPolling && (a.eligibility_status === 'pending' || a.eligibility_status === 'error');
    const btn = isPolling
      ? `<button class="btn btn-primary btn-sm" disabled><span class="spinner"></span> Checking…</button>`
      : canCheck
        ? `<button id="btn-${a.appointment_id}" class="btn btn-primary btn-sm"
             onclick="triggerCheck('${a.appointment_id}')">Check</button>`
        : `<button class="btn btn-sm" style="background:#f1f5f9;color:#94a3b8" disabled>Done</button>`;

    return `<tr>
      <td style="white-space:nowrap">${fmt(a.appointment_datetime)}</td>
      <td>
        <span class="patient-name">${patient}</span>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${ptId}</div>
      </td>
      <td style="font-size:12px">${apptType}</td>
      <td>
        <span class="provider-name">${provName}</span>
        ${specialty ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${specialty}</div>` : ''}
      </td>
      <td>${statusBadge(a.eligibility_status)}</td>
      <td>${btn}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Date / Time</th>
          <th>Patient</th>
          <th>Appointment Type</th>
          <th>Provider</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderGaps(gaps) {
  document.getElementById('gaps-count').textContent = plural(gaps.length, 'gap');
  const el = document.getElementById('gaps-body');

  if (!gaps.length) {
    el.innerHTML = '<div class="empty">&#10003; No unresolved coverage gaps</div>';
    return;
  }

  const items = gaps.map(g => {
    const patientLine = g.patient_name
      ? `<div class="gap-patient">&#128100; ${g.patient_name}${g.appointment_datetime ? '&nbsp;&middot;&nbsp;' + fmt(g.appointment_datetime) : ''}</div>`
      : '';
    return `
    <div class="gap-item">
      <div class="gap-row">
        <span class="gap-type">${g.gap_type.replace(/_/g, ' ')}</span>
        ${severityBadge(g.severity)}
      </div>
      ${patientLine}
      <div class="gap-desc">${g.description}</div>
      <div class="gap-actions">
        <button class="btn btn-sm btn-resolve"
          data-gap-id="${g.gap_id}"
          data-desc="${g.description.replace(/"/g, '&quot;').replace(/'/g, '&#39;')}"
          onclick="openResolveModal(this.dataset.gapId, this.dataset.desc)">
          Resolve
        </button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<div>${items}</div>`;
}

function renderDashboard(d) {
  document.getElementById('stat-today').textContent   = d.appointments_today;
  document.getElementById('stat-pending').textContent = d.pending_checks;
  document.getElementById('stat-gaps').textContent    = d.gaps_unresolved;
  document.getElementById('stat-failed').textContent  = d.checks_failed;
}

// ---------------------------------------------------------------------------
// Data loading
// ---------------------------------------------------------------------------

async function refreshAll() {
  document.getElementById('lastUpdated').textContent = 'Refreshing…';
  try {
    const [dashboard, appts, gaps] = await Promise.all([
      get('/dashboard'),
      get('/appointments?days_ahead=7'),
      get('/gaps'),
    ]);
    renderDashboard(dashboard);

    // Auto-resume polling for any in-flight checks (survives page refresh)
    appts.forEach(a => {
      if (a.active_check_id &&
          (a.active_check_status === 'queued' || a.active_check_status === 'in_progress') &&
          !_polls[a.active_check_id]) {
        _pollingAppts.add(a.appointment_id);
        pollCheck(a.active_check_id, a.appointment_id);
      }
    });

    renderAppointments(appts);
    renderGaps(gaps);
    document.getElementById('lastUpdated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('lastUpdated').textContent = 'Refresh failed — is the server running?';
  }
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

async function triggerCheck(apptId) {
  const btn = document.getElementById(`btn-${apptId}`);
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Submitting…';

  const r = await post(`/appointments/${apptId}/check`, { triggered_by: 'manual' });

  if (r.status === 409) {
    btn.textContent = 'In progress';
    return;
  }
  if (!r.ok) {
    btn.textContent = 'Error';
    btn.disabled = false;
    toast('Failed to queue check — try again');
    return;
  }

  const { check_id } = await r.json();
  _pollingAppts.add(apptId);
  await refreshAll();           // immediately re-render with "Checking…" spinner
  pollCheck(check_id, apptId);
}

function pollCheck(checkId, apptId) {
  if (_polls[checkId]) return;
  _polls[checkId] = setInterval(async () => {
    try {
      const { status } = await get(`/checks/${checkId}`);
      if (status === 'completed' || status === 'failed') {
        clearInterval(_polls[checkId]);
        delete _polls[checkId];
        _pollingAppts.delete(apptId);
        await refreshAll();
        toast(status === 'completed' ? 'Eligibility check complete' : 'Check failed — see error status');
      }
    } catch (_) { /* network blip — keep polling */ }
  }, 2000);
}

// ---------------------------------------------------------------------------
// Resolve modal
// ---------------------------------------------------------------------------

function openResolveModal(gapId, description) {
  _resolveGapId = gapId;
  document.getElementById('modal-desc').textContent    = description;
  document.getElementById('resolvedBy').value          = '';
  document.getElementById('resolutionNote').value      = '';
  document.getElementById('resolveModal').classList.add('open');
  setTimeout(() => document.getElementById('resolvedBy').focus(), 50);
}

function closeModal() {
  document.getElementById('resolveModal').classList.remove('open');
  _resolveGapId = null;
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('resolveModal')) closeModal();
}

async function submitResolve() {
  const resolvedBy = document.getElementById('resolvedBy').value.trim();
  if (!resolvedBy) {
    document.getElementById('resolvedBy').focus();
    return;
  }
  const note = document.getElementById('resolutionNote').value.trim();
  const r = await patch(`/gaps/${_resolveGapId}/resolve`, {
    resolved_by: resolvedBy,
    resolution_note: note || null,
  });
  if (r.ok) {
    closeModal();
    await refreshAll();
    toast('Gap marked as resolved');
  } else {
    toast('Failed to resolve gap — try again');
  }
}

// Keyboard: Escape closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Auto-refresh every 60 seconds
setInterval(refreshAll, 60_000);

// Boot
refreshAll();
</script>

</body>
</html>
